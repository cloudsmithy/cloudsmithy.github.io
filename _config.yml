title: 镜湖
subtitle: "忘机山人的技术随手记 · AWS · Docker · 懒猫微服 · Homelab"
description: "镜湖 - 忘机山人的个人博客，专注 AWS 云计算、Docker 容器、NAS 与懒猫微服、Easysearch、Python 后端开发、AI 部署与 Homelab 实践，记录技术、生活与思考"
keywords:
  - 博客
  - 技术
  - 生活
  - AWS
  - Docker
  - NAS
  - 懒猫微服
  - Easysearch
  - OpenSearch
  - Python
  - Homelab
  - Linux
  - Milvus
  - AI
  - 3D打印
  - 散文
author: 忘机山人
language: zh-CN
timezone: "Asia/Shanghai"
url: https://blog.no-claw.com
root: /
permalink: :abbrlink/

# URL
## If your site is put in a subdirectory, set url as 'http://example.com/project' and root as '/project/'
abbrlink:
  alg: crc32 # 算法：crc16(default) or crc32
  rep: hex # 进制：dec(default) or hex
  use_map: true
pretty_urls:
  trailing_index: false
  trailing_html: false
  drafts: false # 是否为草稿生成 abbrlink
  # 从 Front Matter 中获取 abbrlink
  enable_category: false
  enable_title: false
  enable_date: false
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: ":lang"
skip_render:
  - "_posts/**/Readme.md"
  - "_posts/**/index.md"
  - "_posts/**/后记.md"
  - "_posts/**/序.md"
  - "googlea37b65ccf0f77745.html"
  - "sw.js"
  - "manifest.json"
  - "daily-routine.html"
new_post_name: ":title.md"
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: false
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false
prismjs:
  enable: false
index_generator:
  path: ""
  per_page: 10
  order_by: "-date"
default_category: uncategorized
category_map: null
tag_map: null
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: empty
per_page: 10
pagination_dir: page
include: null
exclude: null
ignore: null
theme: butterfly

deploy:
  type: ""
feed:
  type: atom
  path: atom.xml
  limit: 20
  content: false
  content_limit: 140
  content_limit_delim: " "
sitemap:
  path: sitemap.xml
  tags: true
  categories: true
nofollow:
  enable: true
  field: site
  exclude:
    - blog.no-claw.com
robotstxt:
  useragent: "*"
  disallow:
    - /drafts/
  allow:
    - /
  sitemap: https://blog.no-claw.com/sitemap.xml

# Local search
search:
  path: search.xml
  field: post
  content: true
  format: html



# hexo-minify: 压缩 HTML/CSS/JS/SVG
minify:
  preview: false
  exclude: 
    - "*.min.*"
    - "docs/*"
  js:
    enable: true
    sourceMap:
      enable: false
    options: {}
  css:
    enable: true
    options: {}
  html:
    enable: true
    options:
      minifyJS: true
      minifyCSS: true
      removeComments: true
      collapseWhitespace: true
      removeAttributeQuotes: true
  svg:
    enable: true
    options: {}
  image:
    enable: false
  font:
    enable: false

