name: Deploy GitHub Pages

# 触发条件：在 push 到 master 分支后
on:
  push:
    branches:
      - master

# 任务
jobs:
  build-and-deploy:
    # 服务器环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Hexo build artifacts
        uses: actions/cache@v4
        with:
          path: |
            public
            db.json
          key: hexo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', '_config.yml', '_config.butterfly.yml') }}-${{ hashFiles('source/**') }}
          restore-keys: |
            hexo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', '_config.yml', '_config.butterfly.yml') }}-
            hexo-${{ runner.os }}-

      - name: Build
        run: pnpm build

      - name: Deploy markdown Book
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.acc }}
          branch: docs
          folder: ./source/_posts/
          force: true
          single-commit: true

      - name: Deploy Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.acc }}
          branch: gh-pages
          folder: ./public
          force: true
          single-commit: true

      - name: Wait for GitHub Pages deployment
        run: sleep 30

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://cloudsmithy.github.io/
          uploadArtifacts: true
          temporaryPublicStorage: true
